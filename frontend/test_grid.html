<!DOCTYPE html>
<html>
<head>
<style>
.demo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}
.input {
  background: red;
  height: 640px;
}
.output {
  background: blue;
  height: 0;
  min-height: 100%;
  overflow-y: auto;
}
.output-content {
  height: 1000px;
  background: rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="demo-grid">
  <div class="input">Input (640px)</div>
  <div class="output">
    <div class="output-content">Output (1000px)</div>
  </div>
</div>
</body>
</html>
